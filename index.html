<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Schools Exhibition</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <div class="inner__nav_fix">
                <img src="../assets/logo.png" alt="logo" class="logo">
                <button class="register__btn">Register Now</button>
            </div>

            <div class="inner__nav_scroll">
                <img src="../assets/logo.png" alt="logo" class="scroll__logo">
                <div class="register__btn-scroll">
                    <div class="register__btn__arrow">-></div>
                    <span class="register__btn__text">Register Now</span>
                </div>
            </div>
        </nav>
    </header>


    <main class="main-content">

        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <h2>Discover Gurugram's</h2>
                    <h1> Top 30+ Schools</h1>
                    <span>all in one place</span>
                </div>

                <div class="hero__table">
                    <table border="2">
                        <th>
                            <tr>one</tr>
                            <tr>two</tr>
                        </th>
                    </table>
                </div>
            </div>

            <div class="images__container">
                <div class="image__columns">
                    <div class="img__col_1">
                        <img src="" alt="">
                    </div>
                    <div class="img__col_2">
                        <img src="" alt="">
                    </div>
                    <div class="img__col_3">
                        <img src="" alt="">
                    </div>
                </div>
            </div>

            <aside class="enquiry" >
                <div class="form__container">
                    <h1>Enquiry Now</h1>
                    <form>
                        <input type="text" placeholder="Parent's Name">
                        <input type="number" placeholder="Phone number">
                        <textarea name="" id="">  </textarea>
                        <button>Submit</button>
                    </form>
                </div>

            </aside>

        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <!-- Office addresses, social media links and copyright info -->
    </footer>
</body>

</html>
